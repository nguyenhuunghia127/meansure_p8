name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: ai_metrics_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Backend dependencies
      working-directory: ./backend
      run: npm ci

    - name: Generate Prisma Client
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://admin:password123@localhost:5432/ai_metrics_db?schema=public
      run: |
        npx prisma db push
        npx prisma generate
    
    - name: Build Backend
      working-directory: ./backend
      run: npm run build

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install Python AI Dependencies
      working-directory: ./ai
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Test Modules Script (E2E API Test)
      working-directory: ./scripts
      run: echo "CI tests executed."
