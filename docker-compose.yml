version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: ai_metrics_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - metrics-net

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://admin:password123@postgres:5432/ai_metrics_db?schema=public
    depends_on:
      - postgres
    networks:
      - metrics-net

  ai-service:
    build:
      context: ./ai
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    networks:
      - metrics-net

volumes:
  postgres_data:

networks:
  metrics-net:
    driver: bridge
